<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <meta name="theme-color" content="#000000">

    <title>知るたびに世界は姿を変える</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="app" class="app">

        <!-- =======================================================
             TOPシーン
        ======================================================== -->
        <section
            id="scene-top"
            class="scene is-active"
            data-scene="top"
            aria-labelledby="top-message"
        >
            <div class="scene__inner top-scene__inner">

                <p class="top-scene__lead">
                    知るたびに
                </p>

                <p id="top-message" class="top-scene__message">
                    <span
                        id="worldWord"
                        class="world-word"
                        aria-label="世界"
                    >世界</span><span>は姿を変える。</span>
                </p>

                <button
                    id="startButton"
                    class="start-button"
                    type="button"
                    aria-label="物語を始める"
                >
                    はじめる
                </button>

            </div>
        </section>


        <!-- =======================================================
             INTROシーン
        ======================================================== -->
        <section
            id="scene-intro"
            class="scene"
            data-scene="intro"
            aria-labelledby="intro-heading"
            hidden
        >
            <div class="scene__inner intro-scene__inner">

                <!-- 最初に現れる無音の間 -->
                <div
                    id="introSilence"
                    class="intro-silence"
                    aria-hidden="true"
                >
                    <span class="intro-silence__dots">……</span>
                </div>


                <!-- 手紙カード -->
                <article
                    id="letterCard"
                    class="letter-card"
                    aria-live="polite"
                    hidden
                >
                    <p class="letter-card__eyebrow">
                        見知らぬ手紙
                    </p>

                    <h1
                        id="intro-heading"
                        class="letter-card__title"
                    >
                        拾った紙には、こう書かれていた。
                    </h1>

                    <div class="letter-card__body">

                        <p
                            id="typewriterText"
                            class="typewriter-text"
                        ></p>

                        <span
                            id="typewriterCursor"
                            class="typewriter-cursor"
                            aria-hidden="true"
                        ></span>

                    </div>

                    <button
                        id="introNextButton"
                        class="tap-next-button"
                        type="button"
                        hidden
                    >
                        タップして進む
                    </button>

                </article>


                <!-- 第一章への導入 -->
                <div
                    id="chapterCard"
                    class="chapter-card"
                    hidden
                >
                    <p class="chapter-card__number">
                        第一章
                    </p>

                    <h2 class="chapter-card__title">
                        少年が残した地図
                    </h2>

                    <button
                        id="chapterStartButton"
                        class="start-button chapter-card__button"
                        type="button"
                    >
                        進む
                    </button>
                </div>

            </div>
        </section>


        <!-- =======================================================
             STAGE1シーン（次Versionのための仮画面）
        ======================================================== -->
        <section
            id="scene-stage1"
            class="scene"
            data-scene="stage1"
            aria-labelledby="stage1-title"
            hidden
        >
            <div class="scene__inner stage-placeholder__inner">

                <p class="scene-label">
                    STAGE 1
                </p>

                <h1
                    id="stage1-title"
                    class="stage-placeholder__title"
                >
                    第一問は、次のVersionで実装します。
                </h1>

                <button
                    id="backToTopButton"
                    class="sub-button"
                    type="button"
                >
                    TOPへ戻る
                </button>

            </div>
        </section>


        <!-- =======================================================
             画面暗転レイヤー
        ======================================================== -->
        <div
            id="transitionLayer"
            class="transition-layer"
            aria-hidden="true"
        ></div>

    </div>


    <script src="js/game.js"></script>
    <script src="js/scenes.js"></script>

</body>
</html>
